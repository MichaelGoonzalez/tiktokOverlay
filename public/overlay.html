<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html {
  font-size: clamp(10px, 2vmin + 4px, 22px);
}
body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  user-select: none;
  font-family: 'Press Start 2P', monospace;
  background: transparent;
}
#overlay {
  width: 100%;
  height: 100%;
  background: linear-gradient(180deg, #050805 0%, #0a0514 100%);
  border: 0.15em solid #39ff14;
  border-radius: 0.3em;
  padding: 0.4em 0.5em;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
#overlay::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 0.15em, rgba(57,255,20,0.02) 0.15em, rgba(57,255,20,0.02) 0.3em);
  pointer-events: none; z-index: 0;
}
#overlay::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 30%, transparent 50%, rgba(0,0,0,0.4) 100%);
  pointer-events: none; z-index: 1;
}
.layer { position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column; gap: 0.2em; min-height: 0; }

/* ─── Section backgrounds ─── */
#podioSection {
  border-radius: 0.3em;
  background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('images/fondoarenas.gif') center/cover no-repeat;
  padding: 0.3em 0.4em;
}
#arenasSection {
  border-radius: 0.3em;
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('images/fondopodio.gif') center/cover no-repeat;
  padding: 0.3em 0.4em;
}

/* ─── Top bar ─── */
#topbar {
  display: flex; justify-content: center; align-items: center;
  border-bottom: 0.1em solid #1a3d00; padding-bottom: 0.2em;
}
#viewerBadge { font-size: 1em; color: #60e060; background: #0d1a0d; border: 0.1em solid #1a3d00; padding: 0.2em 0.6em; border-radius: 0.15em; white-space: nowrap; }

/* ─── Podium (Bars with fighters on top) ─── */
#podium {
  display: flex;
  flex-direction: row;
  align-items: flex-end;
  justify-content: center;
  gap: 0.15em;
}
.podCard {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  text-align: center;
  width: 28%;
  max-width: 10em;
}
.podBar {
  width: 100%;
  border-radius: 0.25em 0.25em 0 0;
  border: 0.1em solid;
  border-bottom: none;
  background-size: cover;
  background-position: center;
}
.podCard.pgGold .podBar {
  height: 2.8em;
  background-image: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)), url('images/oropodio.png');
  border-color: rgba(251,191,36,0.3);
}
.podCard.pgPlatino .podBar {
  height: 2.2em;
  background-image: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)), url('images/platinopodio.png');
  border-color: rgba(192,192,192,0.2);
}
.podCard.pgBronce .podBar {
  height: 1.6em;
  background-image: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)), url('images/broncepodio.png');
  border-color: rgba(205,127,50,0.2);
}
.podCard.pgGold.hit .podBar { animation: podHit 0.3s ease; }
@keyframes podHit {
  0%, 100% { border-color: inherit; }
  50% { border-color: rgba(255,0,0,0.6); box-shadow: inset 0 0 0.5em rgba(255,0,0,0.2); }
}
.podCard.emptyRow .podContent { display: none; }
.podCard.emptyRow .podEmptyLabel { display: flex; }
.podEmptyLabel {
  display: none;
  font-size: 0.45em;
  color: #4d8f4d;
  align-items: center;
  justify-content: center;
  min-height: 3.5em;
}

.podContent {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.05em;
  margin-bottom: 0.15em;
  z-index: 1;
}
.podMedal {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  font-size: 1.3em;
  line-height: 1.2;
  pointer-events: none;
  text-shadow: 0 0 0.4em rgba(0,0,0,0.8), 0 0 1em rgba(0,0,0,0.5);
}
.pgGold .podMedal   { bottom: 0.75em; }
.pgPlatino .podMedal{ bottom: 0.45em; }
.pgBronce .podMedal { bottom: 0.15em; }
.podEmoji { font-size: 2.4em; line-height: 1.2; display: inline-block; }
.podAvatar {
  border-radius: 50%;
  object-fit: cover;
  border: 0.15em solid rgba(255,215,0,0.4);
}
.pgGold .podAvatar    { width: 3.2em; height: 3.2em; }
.pgPlatino .podAvatar { width: 2.6em; height: 2.6em; }
.pgBronce .podAvatar  { width: 2em;   height: 2em;   }
.podName  { font-size: 0.65em; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; background: rgba(0,0,0,0.7); padding: 0.06em 0.2em; border-radius: 0.1em; text-shadow: 0 0 0.2em rgba(0,0,0,0.5); }

.podComment { font-size: 0.4em; color: #4d8f4d; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; font-style: italic; display: none; }
.podComment.show { display: inline; }
.podDmg {
  position: absolute; right: 0.15em; top: 0.15em; font-size: 0.8em; font-weight: bold; color: #ff4444;
  text-shadow: 0 0 0.3em rgba(255,0,0,0.5); pointer-events: none;
  animation: podDmgFly 0.7s ease forwards;
}
@keyframes podDmgFly {
  0% { opacity: 1; transform: translateY(0) scale(0.5); }
  40% { opacity: 1; transform: translateY(-0.3em) scale(1.2); }
  100% { opacity: 0; transform: translateY(-0.5em) scale(0.8); }
}

/* ─── League Arenas (Vertical) ─── */
#arenaContainer {
  display: flex;
  flex-direction: row;
  justify-content: center;
  gap: 0.3em;
}
.leagueCard {
  flex: 0 1 auto;
  width: 30%;
  max-width: 22em;
  min-height: 22em;
  border-radius: 0.2em;
  border: 0.1em solid #1a3d00;
  background: rgba(0,0,0,0.25);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0.6em 0.4em;
  gap: 0.2em;
  position: relative;
  overflow: hidden;
}
.leagueCard.oro    { border-color: rgba(251,191,36,0.3);  background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('images/oro.png') center/cover no-repeat; }
.leagueCard.platino{ border-color: rgba(192,192,192,0.25);background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('images/platino.png') center/cover no-repeat; }
.leagueCard.bronce { border-color: rgba(205,127,50,0.25); background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('images/bronce.png') center/cover no-repeat; }
.leagueCard.hitOro { animation: cardHitFlash 0.3s ease; }
@keyframes cardHitFlash {
  0%, 100% { border-color: inherit; }
  50% { border-color: rgba(255,0,0,0.6); box-shadow: inset 0 0 1em rgba(255,0,0,0.2); }
}
.leagueCard.empty { justify-content: center; }
.leagueCard.empty .lcBody { display: none; }
.leagueCard.empty .lcEmpty { display: flex; }

.lcHeader {
  font-size: 1em;
  color: #4d8f4d;
  text-align: center;
  width: 100%;
}
.leagueCard.oro .lcHeader { color: #fbbf24; text-shadow: 0 0 0.3em rgba(251,191,36,0.3); }
.leagueCard.platino .lcHeader { color: #c0c0c0; }
.leagueCard.bronce .lcHeader { color: #cd7f32; }

.lcBody {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.3em;
  width: 100%;
  min-height: 0;
}
.lcFighter {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.1em;
  min-width: 0;
  flex: 1;
  justify-content: center;
  width: 100%;
}
.lcChampion { }
.lcChallenger { }
.lcEmoji { font-size: 1.6em; line-height: 1.2; display: inline-block; }
.lcAvatar { width: 1.8em; height: 1.8em; border-radius: 50%; object-fit: cover; border: 0.08em solid rgba(255,255,255,0.2); display: inline-block; }
.lcName { font-size: 0.6em; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; background: rgba(0,0,0,0.7); padding: 0.05em 0.15em; border-radius: 0.1em; }
.lcLevel { font-size: 0.45em; color: #fbbf24; background: rgba(0,0,0,0.5); padding: 0.03em 0.12em; border-radius: 0.1em; }
.lcHpText { font-size: 0.45em; color: #ff6666; background: rgba(0,0,0,0.5); padding: 0.02em 0.15em; border-radius: 0.1em; }
.lcHpBar {
  width: 85%; height: 0.4em;
  background: #1a0000; border: 0.08em solid #333; border-radius: 0.1em; overflow: hidden;
}
.lcHpFill {
  height: 100%;
  background: linear-gradient(90deg, #22c55e, #39ff14);
  transition: width 0.4s ease;
}
.lcHpFill.low { background: linear-gradient(90deg, #ff4400, #ff0000); }
.lcHpFill.medium { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
.lcVs {
  font-size: 1.6em;
  color: #ff4444;
  text-shadow: 0 0 0.3em rgba(255,0,0,0.3);
  flex-shrink: 0;
  animation: lcVsPulse 1s ease infinite;
  line-height: 1;
  display: flex;
  align-items: center;
  gap: 0.3em;
  width: 100%;
}
.lcVs::before,
.lcVs::after {
  content: '';
  flex: 1;
  height: 0.08em;
  background: linear-gradient(90deg, transparent, rgba(255,68,68,0.3), transparent);
}
@keyframes lcVsPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.lcDmg {
  position: absolute;
  font-size: 1em;
  font-weight: bold;
  color: #ff4444;
  text-shadow: 0 0 0.3em rgba(255,0,0,0.5);
  pointer-events: none;
  z-index: 3;
  animation: lcDmgFly 0.7s ease forwards;
}
.lcHeal {
  position: absolute;
  font-size: 0.9em;
  font-weight: bold;
  color: #39ff14;
  text-shadow: 0 0 0.4em rgba(57,255,20,0.6), 0 0 0.8em rgba(57,255,20,0.3);
  pointer-events: none;
  z-index: 3;
  animation: lcHealFly 1.5s ease forwards;
  white-space: nowrap;
}
@keyframes lcDmgFly {
  0% { opacity: 1; transform: translateY(0) scale(0.5); }
  40% { opacity: 1; transform: translateY(-0.3em) scale(1.2); }
  100% { opacity: 0; transform: translateY(-0.6em) scale(0.8); }
}
@keyframes lcHealFly {
  0% { opacity: 0; transform: translateY(0) scale(0.5); }
  15% { opacity: 1; transform: translateY(-0.2em) scale(1.3); }
  60% { opacity: 1; transform: translateY(-0.6em) scale(1); }
  100% { opacity: 0; transform: translateY(-1.2em) scale(0.9); }
}

.lcEmpty {
  display: none;
  font-size: 0.7em;
  color: #4d8f4d;
  text-align: center;
  flex: 1;
  justify-content: center;
  align-items: center;
}

/* ─── Ranking ─── */
#rankingSection {
  flex: 1;
  min-height: 0;
  border: 0.1em solid #0d1a0d;
  border-radius: 0.2em;
  background: rgba(0,0,0,0.25);
  padding: 0.2em 0.3em;
  overflow-y: auto;
}
#rankingTitle {
  font-size: 0.7em;
  color: #4d8f4d;
  margin-bottom: 0.15em;
  display: flex;
  justify-content: space-between;
}
#rankingList {
  display: flex;
  flex-direction: column;
  gap: 0.1em;
}
.rankItem {
  display: flex;
  align-items: center;
  gap: 0.3em;
  padding: 0.2em 0.3em;
  background: rgba(0,0,0,0.2);
  border: 0.1em solid transparent;
  border-radius: 0.15em;
  animation: rankEnter 0.3s ease;
  min-height: 1.8em;
}
.rankItem:nth-child(1) { border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.04); }
.rankItem:nth-child(2) { border-color: rgba(192,192,192,0.2); background: rgba(192,192,192,0.02); }
.rankItem:nth-child(3) { border-color: rgba(205,127,50,0.2); background: rgba(205,127,50,0.02); }
@keyframes rankEnter {
  0% { opacity: 0; transform: translateX(-0.5em); }
  100% { opacity: 1; transform: translateX(0); }
}
.rankPos {
  font-size: 1.1em; color: #555; width: 2em; text-align: center; flex-shrink: 0;
}
.rankPos.gold { color: #fbbf24; }
.rankPos.silver { color: #c0c0c0; }
.rankPos.bronze { color: #cd7f32; }
.rankEmoji { font-size: 1.2em; line-height: 1; flex-shrink: 0; width: 1.3em; text-align: center; }
.rankAvatar { width: 1.4em; height: 1.4em; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.rankName { font-size: 0.8em; color: #fff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: rgba(0,0,0,0.7); padding: 0.04em 0.15em; border-radius: 0.1em; }
.rankScore { font-size: 0.9em; color: #39ff14; width: 5em; text-align: center; flex-shrink: 0; }

/* ─── Feed ─── */
#feed {
  min-height: 1.2em;
  overflow: hidden;
  border: 0.1em solid #1a3d00;
  background: rgba(10,20,10,0.25);
  border-radius: 0.15em;
  padding: 0.1em 0.3em;
}
.feedItem {
  font-size: 0.7em;
  line-height: 1.8;
  color: #4d8f4d;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  animation: feedIn 0.15s ease;
}
@keyframes feedIn { from { opacity: 0; transform: translateX(-0.3em); } to { opacity: 1; transform: translateX(0); } }

/* ─── Toast ─── */
#toastContainer {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 100; pointer-events: none;
}
.toast {
  font-size: 1.6em; text-align: center; line-height: 1.8;
  animation: toastAnim 2.5s ease forwards; white-space: pre-line;
}
.toast.levelup { color: #39ff14; text-shadow: 0 0 1.2em #39ff14, 0 0 2.5em #00ff00; }
.toast.arena_up { color: #fbbf24; text-shadow: 0 0 1.2em #fbbf24, 0 0 2.5em #ff8800; }
.toast.swap { color: #ff4444; text-shadow: 0 0 1.2em #ff4444, 0 0 2.5em #ff0000; font-size: 2em; }
@keyframes toastAnim {
  0% { opacity: 0; transform: scale(0.5); }
  15% { opacity: 1; transform: scale(1.1); }
  80% { opacity: 1; }
  100% { opacity: 0; transform: scale(1); }
}
</style>
</head>

<script>
const socket = io();
const $ = id => document.getElementById(id);
const hpClass = pct => pct <= 0 ? 'dead' : pct < 25 ? 'low' : pct < 55 ? 'medium' : '';

function setAvatar(el, emoji, avatarUrl, avatarClass) {
  if (avatarUrl) {
    el.innerHTML = '<img src="' + avatarUrl + '" class="' + avatarClass + '" alt="">';
  } else {
    el.textContent = emoji;
  }
}

function showToast(msg, type) {
  const c = $('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// ─── League arena helpers ───
const LEAGUE_IDS = {
  oro:    { card: 'arenaOro',    chalEmoji: 'oroChalEmoji', chalName: 'oroChalName', chalHp: 'oroChalHp', chalLevel: 'oroChalLevel', chalHpText: 'oroChalHpText', champEmoji: 'oroChampEmoji', champName: 'oroChampName', champHp: 'oroChampHp', champLevel: 'oroChampLevel', champHpText: 'oroChampHpText' },
  platinum: { card: 'arenaPlatino', chalEmoji: 'platChalEmoji',chalName: 'platChalName',chalHp: 'platChalHp',chalLevel: 'platChalLevel',chalHpText: 'platChalHpText',champEmoji: 'platChampEmoji',champName: 'platChampName',champHp: 'platChampHp',champLevel: 'platChampLevel',champHpText: 'platChampHpText' },
  bronze: { card: 'arenaBronce', chalEmoji: 'bronChalEmoji',chalName: 'bronChalName',chalHp: 'bronChalHp',chalLevel: 'bronChalLevel',chalHpText: 'bronChalHpText',champEmoji: 'bronChampEmoji',champName: 'bronChampName',champHp: 'bronChampHp',champLevel: 'bronChampLevel',champHpText: 'bronChampHpText' },
};

const LEAGUE_MAP = {
  '🥇 GOLD': 'oro',
  '🥈 PLATINUM': 'platinum',
  '🥉 BRONCE': 'bronze',
};

function idOf(leagueLabel, field) {
  const key = LEAGUE_MAP[leagueLabel] || 'oro';
  const ids = LEAGUE_IDS[key];
  return ids ? $(ids[field]) : null;
}

function setLeagueEmpty(cardId) {
  const card = $(cardId);
  if (!card) return;
  card.classList.add('empty');
}

function fillLeagueCard(cardId, result) {
  const card = $(cardId);
  if (!card) return;
  card.classList.remove('empty');

  const keyMap = { 'arenaOro': 'oro', 'arenaPlatino': 'platinum', 'arenaBronce': 'bronze' };
  const ids = LEAGUE_IDS[keyMap[cardId]];

  setAvatar($(ids.chalEmoji), result.chEmoji, result.chAvatar, 'lcAvatar');
  $(ids.chalName).textContent = result.challenger;
  $(ids.chalLevel).textContent = 'LVL ' + result.chLevel;
  const chPct = Math.max(0, (result.chHp / result.chMaxHp) * 100);
  $(ids.chalHp).style.width = chPct + '%';
  $(ids.chalHp).className = 'lcHpFill ' + hpClass(chPct);
  $(ids.chalHpText).textContent = 'HP ' + result.chHp + '/' + result.chMaxHp;

  setAvatar($(ids.champEmoji), result.cEmoji, result.cAvatar, 'lcAvatar');
  $(ids.champName).textContent = result.champion;
  $(ids.champLevel).textContent = 'LVL ' + result.cLevel;
  const cPct = Math.max(0, (result.cHp / result.cMaxHp) * 100);
  $(ids.champHp).style.width = cPct + '%';
  $(ids.champHp).className = 'lcHpFill ' + hpClass(cPct);
  $(ids.champHpText).textContent = 'HP ' + result.cHp + '/' + result.cMaxHp;
}

function animateLeagueHit(cardId, damage, label) {
  const card = $(cardId);
  if (!card) return;
  card.classList.remove('hitOro');
  void card.offsetWidth;
  card.classList.add('hitOro');

  const dmgEl = document.createElement('div');
  dmgEl.className = 'lcDmg';
  dmgEl.textContent = (label ? label + ' ' : '') + '-' + damage;
  dmgEl.style.left = '50%';
  dmgEl.style.top = '0.3em';
  card.appendChild(dmgEl);
  setTimeout(() => { if (dmgEl.parentNode) dmgEl.remove(); }, 800);

  const avatar = card.querySelector('.lcChallenger .lcEmoji, .lcChallenger .lcAvatar');
  if (avatar) {
    avatar.style.transition = 'transform 0.12s ease';
    avatar.style.transform = 'translateY(-4.5em)';
    setTimeout(() => {
      avatar.style.transform = 'translateY(0)';
      setTimeout(() => { avatar.style.transition = ''; }, 200);
    }, 180);
  }
}

function animateLeagueHeal(cardId, heal, label) {
  const card = $(cardId);
  if (!card) return;

  const healEl = document.createElement('div');
  healEl.className = 'lcHeal';
  healEl.textContent = (label ? label + ' ' : '') + '+' + heal + ' 🍃';
  healEl.style.left = '50%';
  healEl.style.top = '0.8em';
  card.appendChild(healEl);
  setTimeout(() => { if (healEl.parentNode) healEl.remove(); }, 1600);
}

// ─── League battles ───
socket.on('league_battles', (results) => {
  if (!results || results.length === 0) return;
  const leagueIds = ['arenaOro', 'arenaPlatino', 'arenaBronce'];

  results.forEach((r, i) => {
    if (i >= leagueIds.length) return;
    fillLeagueCard(leagueIds[i], r);
    if (r.damage > 0) animateLeagueHit(leagueIds[i], r.damage, r.interactionLabel);
    if (r.heal > 0) animateLeagueHeal(leagueIds[i], r.heal, r.interactionLabel);
  });

  // Podium hit feedback only for oro
  const oro = results[0];
  if (oro) {
    const pg = $('podGold');
    pg.classList.remove('hit');
    void pg.offsetWidth;
    pg.classList.add('hit');
    const oldDmg = pg.querySelector('.podDmg');
    if (oldDmg) oldDmg.remove();
    const dmgEl = document.createElement('div');
    dmgEl.className = 'podDmg';
    const net = oro.heal - oro.damage;
    const netLabel = oro.interactionLabel || '';
    dmgEl.textContent = netLabel ? netLabel + ' ' : '';
    dmgEl.textContent += net >= 0 ? '+' + net : net;
    pg.appendChild(dmgEl);
    setTimeout(() => { if (dmgEl.parentNode) dmgEl.remove(); }, 900);
  }
});



// ─── Battle swap (cambio de campeón) ───
socket.on('battle_swap', (d) => {
  showToast('⚡ ' + d.winner + ' DESTRONA A ' + d.loser + '!\nNUEVO CAMPEÓN 👑', 'swap');
});

// ─── State ──────────────────────────────────────────────────
socket.on('state', (s) => {
  $('viewerCount').textContent = s.viewers;

  const fCount = Object.keys(s.fighters || {}).length;
  $('fighterCount').textContent = fCount + ' luchadores';

  // Podium
  const rankings = s.rankings || [];
  const fighters = s.fighters || {};
  const podConfigs = [
    { row: 'podGold',    idx: 0, nameId: 'pgName', emojiId: 'pgEmoji', commentId: 'pgComment' },
    { row: 'podPlatino', idx: 2, nameId: 'ppName', emojiId: 'ppEmoji', commentId: 'ppComment' },
    { row: 'podBronce',  idx: 4, nameId: 'pbName', emojiId: 'pbEmoji', commentId: 'pbComment' },
  ];
  for (const cfg of podConfigs) {
    const row = $(cfg.row);
    if (rankings.length > cfg.idx && fighters[rankings[cfg.idx]]) {
      const f = fighters[rankings[cfg.idx]];
      row.classList.remove('emptyRow');
      setAvatar($(cfg.emojiId), f.emoji, f.avatarUrl, 'podAvatar');
      $(cfg.nameId).textContent = rankings[cfg.idx];
      // Comment only on gold row
      if (cfg.idx === 0) {
        const ct = $(cfg.commentId);
        if (s.championComment) {
          ct.textContent = '💬 ' + s.championComment;
          ct.classList.add('show');
        } else {
          ct.textContent = '';
          ct.classList.remove('show');
        }
      }
    } else {
      row.classList.add('emptyRow');
    }
  }

  // Ranking
  const list = $('rankingList');
  list.innerHTML = '';
  if (rankings.length === 0) {
    list.innerHTML = '<div style="font-size:0.6em;color:#444;text-align:center;padding:0.5em">SIN LUCHADOR</div>';
  } else {
    rankings.forEach((name, i) => {
      const f = fighters[name];
      if (!f) return;
      const el = document.createElement('div');
      el.className = 'rankItem';
      const posClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      const crown = i === 0 ? '👑' : '';
      const puntuacion = (f.xp || 0) + (f.donations || 0) * 10;
      const rankEmojiHtml = f.avatarUrl ? '<img src="' + f.avatarUrl + '" class="rankAvatar" alt="">' : f.emoji;
      el.innerHTML = `
        <span class="rankPos ${posClass}">${crown || (i + 1)}</span>
        <span class="rankEmoji">${rankEmojiHtml}</span>
        <span class="rankName">${name}</span>
        <span class="rankScore">★${puntuacion}</span>
      `;
      list.appendChild(el);
    });
  }

  // Initialize league arenas from state
  const leagueConfigs = [
    { card: 'arenaOro',    idx: 0 },
    { card: 'arenaPlatino',idx: 2 },
    { card: 'arenaBronce', idx: 4 },
  ];
  for (const cfg of leagueConfigs) {
    const a = cfg.idx;
    const b = cfg.idx + 1;
    if (rankings.length > b && fighters[rankings[a]] && fighters[rankings[b]]) {
      const champ = fighters[rankings[a]];
      const chal = fighters[rankings[b]];
      const stub = {
        champion: rankings[a], challenger: rankings[b],
        cEmoji: champ.emoji, chEmoji: chal.emoji,
        cAvatar: champ.avatarUrl, chAvatar: chal.avatarUrl,
        cLevel: champ.level, chLevel: chal.level,
        cHp: champ.hp, cMaxHp: champ.maxHp,
        chHp: chal.hp, chMaxHp: chal.maxHp,
        damage: 0,
      };
      fillLeagueCard(cfg.card, stub);
    } else if (rankings.length > a && fighters[rankings[a]]) {
      // Only one fighter in this league pair
      setLeagueEmpty(cfg.card);
    } else {
      setLeagueEmpty(cfg.card);
    }
  }

});

// ─── Fighter level up ───
socket.on('fighter_levelup', (d) => {
  showToast('⬆ ' + d.username + ' SUBE A NIVEL ' + d.level + '! ' + d.emoji, 'levelup');
});

// ─── Arena level up ───
socket.on('arena_levelup', (d) => {
  showToast('🌟 LA ARENA SUBE A NIVEL ' + d.level + '!', 'arena_up');
});

// ─── Feed ────────────────────────────────────────────────────
const feed = $('feed');
socket.on('event', (ev) => {
  const el = document.createElement('div');
  el.className = 'feedItem';
  let txt = '';
  if (ev.type === 'like') txt = '❤ ' + ev.user + ' dio ' + (ev.count || 1) + ' me gusta';
  else if (ev.type === 'gift') txt = '🪙 ' + ev.user + ' donó ' + (ev.gift || '') + ' x' + (ev.diamonds || 1);
  else if (ev.type === 'follow') txt = '⭐ ' + ev.user + ' siguió';
  else if (ev.type === 'share') txt = '🔗 ' + ev.user + ' compartió';
  else if (ev.type === 'comment') txt = '💬 ' + ev.user + ': "' + (ev.comment || '') + '"';
  el.textContent = txt;
  feed.innerHTML = '';
  feed.appendChild(el);
});
</script>
