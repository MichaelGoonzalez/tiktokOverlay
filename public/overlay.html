<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: transparent;
  font-family: 'Press Start 2P', monospace;
  width: 560px;
  overflow: hidden;
  user-select: none;
}
#overlay {
  width: 560px;
  height: 480px;
  background: linear-gradient(180deg, #050805 0%, #0a0514 100%);
  border: 2px solid #39ff14;
  border-radius: 4px;
  padding: 6px 8px;
  position: relative;
  overflow: hidden;
}
#overlay::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(57,255,20,0.02) 2px, rgba(57,255,20,0.02) 4px);
  pointer-events: none; z-index: 0;
}
#overlay::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 30%, transparent 50%, rgba(0,0,0,0.4) 100%);
  pointer-events: none; z-index: 1;
}
.layer { position: relative; z-index: 2; }

/* ─── Top bar ─── */
#topbar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 3px; border-bottom: 1px solid #1a3d00; padding-bottom: 3px;
}
#streamTitle { font-size: 6px; color: #39ff14; text-shadow: 0 0 4px rgba(57,255,20,0.3); }
#streamUser { color: #fff; }
#viewerBadge { font-size: 5px; color: #60e060; background: #0d1a0d; border: 1px solid #1a3d00; padding: 2px 4px; border-radius: 2px; white-space: nowrap; }
#arenaLevelBadge { font-size: 5px; background: #39ff14; color: #050805; padding: 2px 5px; border-radius: 2px; }

/* ─── Champion Section ─── */
#championSection {
  height: 80px;
  margin-bottom: 3px;
  background: linear-gradient(135deg, rgba(251,191,36,0.08) 0%, rgba(251,191,36,0.02) 100%);
  border: 2px solid rgba(251,191,36,0.3);
  border-radius: 4px;
  padding: 5px 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
  overflow: hidden;
}
#championSection::before {
  content: '👑';
  position: absolute;
  top: -8px; left: 50%;
  transform: translateX(-50%);
  font-size: 20px;
  opacity: 0.15;
  pointer-events: none;
}
#champCrown {
  font-size: 28px;
  line-height: 1;
  filter: drop-shadow(0 0 8px rgba(251,191,36,0.5));
  animation: crownGlow 1.5s ease infinite;
  flex-shrink: 0;
}
@keyframes crownGlow {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(251,191,36,0.3)); }
  50% { filter: drop-shadow(0 0 15px rgba(251,191,36,0.7)); }
}
#champEmoji {
  font-size: 30px;
  line-height: 1;
  flex-shrink: 0;
  filter: drop-shadow(0 0 6px currentColor);
}
#champInfo {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}
#champName {
  font-size: 8px;
  color: #fbbf24;
  text-shadow: 0 0 8px rgba(251,191,36,0.3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#champStats {
  display: flex;
  gap: 8px;
  font-size: 5px;
  color: #888;
}
#champStats span { color: #ccc; }
#champHpBar {
  width: 100%;
  height: 6px;
  background: #1a0000;
  border: 1px solid rgba(251,191,36,0.4);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 2px;
}
#champHpFill {
  height: 100%;
  background: linear-gradient(90deg, #ff4400, #ff8800, #fbbf24);
  transition: width 0.4s ease;
  box-shadow: 0 0 8px rgba(251,191,36,0.3);
  position: relative;
}
#champHpFill::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
  animation: hpShine 2s linear infinite;
}
#champWins {
  font-size: 4px;
  color: #fbbf24;
}
#champDmg {
  position: absolute;
  right: 10px;
  font-size: 14px;
  font-weight: bold;
  color: #ff4444;
  text-shadow: 0 0 10px rgba(255,0,0,0.5);
  animation: dmgFlash 0.8s ease forwards;
  pointer-events: none;
}
@keyframes dmgFlash {
  0% { opacity: 1; transform: scale(0.5); }
  40% { opacity: 1; transform: scale(1.3); }
  100% { opacity: 0; transform: scale(0.8) translateY(-10px); }
}

/* ─── Battle Arena ─── */
#battleArena {
  height: 70px;
  margin-bottom: 3px;
  background: radial-gradient(ellipse at 50% 60%, rgba(20,40,10,0.4) 0%, rgba(0,0,0,0.5) 100%);
  border: 1px solid #1a3d00;
  border-radius: 3px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
#battleArena::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 10px;
  background: repeating-linear-gradient(90deg, #1a3d00 0px, #1a3d00 10px, #0d1a0d 10px, #0d1a0d 20px);
}
#battleContent {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 4px 8px;
  position: relative;
  z-index: 2;
}
.bFighter {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  flex: 1;
  max-width: 200px;
}
.bFighter .row1 {
  display: flex;
  align-items: center;
  gap: 4px;
}
.bFighter .emoji { font-size: 18px; line-height: 1; }
.bFighter .name { font-size: 5px; color: #ccc; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bFighter .level { font-size: 4px; color: #666; }
.bFighter .hpBar {
  width: 100%; max-width: 160px; height: 4px;
  background: #1a0000; border: 1px solid #333; border-radius: 2px; overflow: hidden;
}
.bFighter .hpFill {
  height: 100%;
  background: linear-gradient(90deg, #22c55e, #39ff14);
  transition: width 0.4s ease;
}
.bFighter .hpFill.low { background: linear-gradient(90deg, #ff4400, #ff0000); }
.bFighter .hpFill.medium { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
.bFighter .hpText { font-size: 4px; color: #666; }
.bFighter.attacking .emoji { animation: attackLunge 0.3s ease; }
@keyframes attackLunge {
  0% { transform: translateX(0); }
  50% { transform: translateX(15px) scale(1.2); }
  100% { transform: translateX(0); }
}
.bFighter.hit .emoji { animation: hitShake 0.2s ease; }
@keyframes hitShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px) rotate(-5deg); }
  75% { transform: translateX(5px) rotate(5deg); }
}
#vsText {
  font-size: 11px;
  color: #ff4444;
  text-shadow: 0 0 8px rgba(255,0,0,0.3);
  flex-shrink: 0;
  animation: vsPulse 1s ease infinite;
}
@keyframes vsPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
#battleDmg {
  position: absolute;
  top: 8px;
  font-size: 10px;
  font-weight: bold;
  color: #ff4444;
  text-shadow: 0 0 10px rgba(255,0,0,0.5);
  pointer-events: none;
  z-index: 5;
  animation: dmgFly 0.7s ease forwards;
}
@keyframes dmgFly {
  0% { opacity: 1; transform: translateY(0) scale(0.5); }
  40% { opacity: 1; transform: translateY(-8px) scale(1.3); }
  100% { opacity: 0; transform: translateY(-18px) scale(0.8); }
}

/* ─── Ranking ─── */
#rankingSection {
  height: 160px;
  margin-bottom: 2px;
  border: 1px solid #0d1a0d;
  border-radius: 3px;
  background: rgba(0,0,0,0.25);
  padding: 3px 4px;
  overflow: hidden;
}
#rankingTitle {
  font-size: 4px;
  color: #4d8f4d;
  margin-bottom: 2px;
  display: flex;
  justify-content: space-between;
}
#rankingList {
  display: flex;
  flex-direction: column;
  gap: 1.5px;
}
.rankItem {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 2px 3px;
  background: rgba(0,0,0,0.2);
  border: 1px solid transparent;
  border-radius: 2px;
  animation: rankEnter 0.3s ease;
  min-height: 16px;
}
.rankItem:nth-child(1) { border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.04); }
.rankItem:nth-child(2) { border-color: rgba(192,192,192,0.2); background: rgba(192,192,192,0.02); }
.rankItem:nth-child(3) { border-color: rgba(205,127,50,0.2); background: rgba(205,127,50,0.02); }
@keyframes rankEnter {
  0% { opacity: 0; transform: translateX(-6px); }
  100% { opacity: 1; transform: translateX(0); }
}
.rankPos {
  font-size: 5px; color: #555; width: 16px; text-align: center; flex-shrink: 0;
}
.rankPos.gold { color: #fbbf24; }
.rankPos.silver { color: #c0c0c0; }
.rankPos.bronze { color: #cd7f32; }
.rankEmoji { font-size: 10px; line-height: 1; flex-shrink: 0; width: 16px; text-align: center; }
.rankName { font-size: 5px; color: #ccc; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rankLevel { font-size: 4px; color: #666; width: 28px; flex-shrink: 0; }
.rankHpBar {
  width: 40px; height: 3px;
  background: #1a0000; border: 1px solid #333; border-radius: 1px; overflow: hidden; flex-shrink: 0;
}
.rankHpFill {
  height: 100%;
  background: linear-gradient(90deg, #22c55e, #39ff14);
  transition: width 0.3s;
}
.rankHpFill.low { background: linear-gradient(90deg, #ff4400, #ff0000); }
.rankHpFill.medium { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
.rankHpText { font-size: 4px; color: #555; width: 32px; text-align: right; flex-shrink: 0; }

/* ─── Stats row ─── */
#statsRow {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 2px;
  margin-bottom: 2px;
}
.statBox {
  background: rgba(13,26,13,0.7);
  border: 1px solid #1a3d00;
  border-radius: 2px;
  padding: 2px 2px;
  text-align: center;
  overflow: hidden;
}
.statBox::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(57,255,20,0.3), transparent);
}
.statLabel { font-size: 4px; color: #4d8f4d; margin-bottom: 1px; }
.statVal { font-size: 7px; color: #39ff14; text-shadow: 0 0 3px rgba(57,255,20,0.3); }
#likeBox { border-color: #ff3377; }
#likeBox .statLabel { color: #ff6699; }
#likeBox .statVal { color: #ff6b9d; text-shadow: 0 0 6px rgba(255,107,157,0.4); }
#coinBox { border-color: #fbbf24; }
#coinBox .statLabel { color: #d49400; }
#coinBox .statVal { color: #fbbf24; text-shadow: 0 0 6px rgba(251,191,36,0.4); }
#fighterBox { border-color: #a855f7; }
#fighterBox .statLabel { color: #a855f7; }
#fighterBox .statVal { color: #c084fc; }
#comboBox { border-color: #ff4400; background: rgba(40,10,0,0.7); }
#comboBox.high { border-color: #ff6600; box-shadow: 0 0 8px rgba(255,100,0,0.3); }
#comboBox.max { border-color: #ffcc00; box-shadow: 0 0 15px rgba(255,200,0,0.5); animation: comboPulse 0.5s ease infinite; }
@keyframes comboPulse {
  0%, 100% { box-shadow: 0 0 10px rgba(255,200,0,0.3); }
  50% { box-shadow: 0 0 20px rgba(255,200,0,0.6); }
}
#comboBox .statLabel { color: #ff6600; }
#comboBox .statVal { color: #ff8800; text-shadow: 0 0 6px rgba(255,136,0,0.4); }
#comboBox.high .statVal { color: #ffaa00; text-shadow: 0 0 10px rgba(255,170,0,0.6); }
#comboBox.max .statVal { color: #ffdd00; text-shadow: 0 0 15px rgba(255,221,0,0.8); }

.statVal.pop { animation: statPop 0.2s ease; }
@keyframes statPop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

/* ─── Arena XP bar ─── */
#xpRow { margin-bottom: 2px; }
#xpLabel {
  font-size: 4px; color: #4d8f4d;
  display: flex; justify-content: space-between; margin-bottom: 1px;
}
#xpBar {
  width: 100%; height: 3px;
  background: #0d1a0d; border: 1px solid #1a3d00;
  border-radius: 2px; overflow: hidden;
}
#xpFill {
  height: 100%; background: linear-gradient(90deg, #7c3aed, #a855f7);
  transition: width 0.5s ease;
  box-shadow: 0 0 4px #a855f7;
}

/* ─── Feed ─── */
#feed {
  height: 16px;
  overflow: hidden;
  border: 1px solid #1a3d00;
  background: rgba(10,20,10,0.25);
  border-radius: 2px;
  padding: 1px 4px;
}
.feedItem {
  font-size: 4px;
  line-height: 1.8;
  color: #4d8f4d;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  animation: feedIn 0.15s ease;
}
@keyframes feedIn { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; transform: translateX(0); } }

/* ─── Toast ─── */
#toastContainer {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 100; pointer-events: none;
}
.toast {
  font-size: 9px; text-align: center; line-height: 1.8;
  animation: toastAnim 2.5s ease forwards; white-space: pre-line;
}
.toast.levelup { color: #39ff14; text-shadow: 0 0 20px #39ff14, 0 0 40px #00ff00; }
.toast.arena_up { color: #fbbf24; text-shadow: 0 0 20px #fbbf24, 0 0 40px #ff8800; }
.toast.swap { color: #ff4444; text-shadow: 0 0 20px #ff4444, 0 0 40px #ff0000; font-size: 11px; }
@keyframes toastAnim {
  0% { opacity: 0; transform: scale(0.5); }
  15% { opacity: 1; transform: scale(1.1); }
  80% { opacity: 1; }
  100% { opacity: 0; transform: scale(1); }
}
</style>
</head>
<body>

<div id="overlay">
  <div class="layer">

    <!-- Top bar -->
    <div id="topbar">
      <span id="streamTitle">⚔ <span id="streamUser">rata_juega666</span> ⚔</span>
      <span id="viewerBadge">👁 <span id="viewerCount">0</span></span>
      <span id="arenaLevelBadge">ARENA <span id="arenaLevelNum">1</span></span>
    </div>

    <!-- Champion -->
    <div id="championSection">
      <span id="champCrown">👑</span>
      <span id="champEmoji">🧙</span>
      <div id="champInfo">
        <div id="champName">Esperando campeón...</div>
        <div id="champStats">
          <span id="champLevel">NIVEL 1</span>
          <span id="champHpDisplay">HP 0/0</span>
          <span id="champWins">🏆 0</span>
        </div>
        <div id="champHpBar"><div id="champHpFill" style="width:100%"></div></div>
      </div>
    </div>

    <!-- Battle Arena -->
    <div id="battleArena">
      <div id="battleContent">
        <div class="bFighter" id="bLeft">
          <div class="row1">
            <span class="emoji" id="bLeftEmoji">🗡️</span>
            <span class="name" id="bLeftName">---</span>
            <span class="level" id="bLeftLevel">LVL ?</span>
          </div>
          <div class="hpBar"><div class="hpFill" id="bLeftHp" style="width:100%"></div></div>
          <span class="hpText" id="bLeftHpText">HP 0/0</span>
        </div>
        <span id="vsText">VS</span>
        <div class="bFighter" id="bRight">
          <div class="row1">
            <span class="emoji" id="bRightEmoji">👑</span>
            <span class="name" id="bRightName">---</span>
            <span class="level" id="bRightLevel">LVL ?</span>
          </div>
          <div class="hpBar"><div class="hpFill" id="bRightHp" style="width:100%"></div></div>
          <span class="hpText" id="bRightHpText">HP 0/0</span>
        </div>
      </div>
    </div>

    <!-- Ranking -->
    <div id="rankingSection">
      <div id="rankingTitle">
        <span>🏆 RANKING</span>
        <span id="fighterCount">0</span>
      </div>
      <div id="rankingList"></div>
    </div>

    <!-- Stats -->
    <div id="statsRow">
      <div class="statBox" id="likeBox">
        <div class="statLabel">❤ ME GUSTA</div>
        <div class="statVal" id="sLikes">0</div>
      </div>
      <div class="statBox" id="coinBox">
        <div class="statLabel">🪙 DONACIONES</div>
        <div class="statVal" id="sCoins">0</div>
      </div>
      <div class="statBox" id="fighterBox">
        <div class="statLabel">⚔ LUCHADORES</div>
        <div class="statVal" id="sFighters">0</div>
      </div>
      <div class="statBox" id="comboBox">
        <div class="statLabel">🔥 COMBO</div>
        <div class="statVal" id="sCombo">x1</div>
      </div>
    </div>

    <!-- Arena XP -->
    <div id="xpRow">
      <div id="xpLabel">
        <span>🌟 FAMA</span>
        <span><span id="xpCur">0</span> / <span id="xpNext">500</span></span>
      </div>
      <div id="xpBar"><div id="xpFill" style="width:0%"></div></div>
    </div>

    <!-- Feed -->
    <div id="feed"></div>

  </div>
</div>

<div id="toastContainer"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const $ = id => document.getElementById(id);

function showToast(msg, type) {
  const c = $('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

function hpClass(pct) {
  if (pct <= 0) return 'dead';
  if (pct < 25) return 'low';
  if (pct < 55) return 'medium';
  return '';
}

let currentBattle = null;

// ─── Battle tick ───
socket.on('battle_tick', (d) => {
  currentBattle = d;
  const left = $('bLeft');
  const right = $('bRight');
  const leftHp = $('bLeftHp');
  const rightHp = $('bRightHp');

  // challenger = attacker = left, champion = right
  $('bLeftEmoji').textContent = d.chEmoji;
  $('bLeftName').textContent = d.challenger;
  $('bLeftLevel').textContent = 'LVL ' + d.chLevel;
  const chPct = Math.max(0, (d.chHp / d.chMaxHp) * 100);
  leftHp.style.width = chPct + '%';
  leftHp.className = 'hpFill ' + hpClass(chPct);
  $('bLeftHpText').textContent = 'HP ' + d.chHp + '/' + d.chMaxHp;

  $('bRightEmoji').textContent = d.cEmoji;
  $('bRightName').textContent = d.champion;
  $('bRightLevel').textContent = 'LVL ' + d.cLevel;
  const cPct = Math.max(0, (d.cHp / d.cMaxHp) * 100);
  rightHp.style.width = cPct + '%';
  rightHp.className = 'hpFill ' + hpClass(cPct);
  $('bRightHpText').textContent = 'HP ' + d.cHp + '/' + d.cMaxHp;

  // Animation
  left.classList.remove('attacking', 'hit');
  right.classList.remove('attacking', 'hit');
  void left.offsetWidth;
  left.classList.add('attacking');
  right.classList.add('hit');

  // Damage number
  const old = document.getElementById('battleDmg');
  if (old) old.remove();
  const dmgEl = document.createElement('div');
  dmgEl.id = 'battleDmg';
  dmgEl.textContent = '-' + d.damage + ' HP';
  dmgEl.style.left = '55%';
  dmgEl.style.top = '15px';
  $('battleArena').appendChild(dmgEl);
  setTimeout(() => dmgEl.remove(), 800);
});

// ─── Battle swap (cambio de campeón) ───
socket.on('battle_swap', (d) => {
  showToast('⚡ ' + d.winner + ' DESTRONA A ' + d.loser + '!\nNUEVO CAMPEÓN 👑', 'swap');
});

// ─── State ──────────────────────────────────────────────────
socket.on('state', (s) => {
  $('streamUser').textContent = s.username || 'rata_juega666';
  $('arenaLevelNum').textContent = s.arenaLevel;
  $('arenaLevelBadge').textContent = 'ARENA ' + s.arenaLevel;
  $('viewerCount').textContent = s.viewers;
  $('sLikes').textContent = s.likes;
  $('sCoins').textContent = s.coins;

  const fCount = Object.keys(s.fighters || {}).length;
  $('sFighters').textContent = fCount;
  $('fighterCount').textContent = fCount + ' luchadores';

  const xpPct = Math.min(100, (s.arenaXp / s.arenaXpNext) * 100);
  $('xpFill').style.width = xpPct + '%';
  $('xpCur').textContent = s.arenaXp;
  $('xpNext').textContent = s.arenaXpNext;

  // Champion section
  const rankings = s.rankings || [];
  const fighters = s.fighters || {};
  if (rankings.length > 0) {
    const champ = fighters[rankings[0]];
    if (champ) {
      $('champCrown').textContent = '👑';
      $('champEmoji').textContent = champ.emoji;
      $('champName').textContent = rankings[0];
      $('champLevel').textContent = 'NIVEL ' + champ.level;
      $('champHpDisplay').textContent = 'HP ' + champ.hp + '/' + champ.maxHp;
      $('champWins').textContent = '🏆 ' + (champ.wins || 0);
      const pct = Math.max(0, (champ.hp / champ.maxHp) * 100);
      $('champHpFill').style.width = pct + '%';
    }
  } else {
    $('champCrown').textContent = '⚔';
    $('champEmoji').textContent = '🧙';
    $('champName').textContent = 'Sin campeón aún...';
    $('champLevel').textContent = '';
    $('champHpDisplay').textContent = '';
    $('champWins').textContent = '';
    $('champHpFill').style.width = '0%';
  }

  // Ranking
  const list = $('rankingList');
  list.innerHTML = '';
  if (rankings.length === 0) {
    list.innerHTML = '<div style="font-size:4px;color:#444;text-align:center;padding:8px">Esperando luchadores...</div>';
  } else {
    rankings.forEach((name, i) => {
      const f = fighters[name];
      if (!f) return;
      const el = document.createElement('div');
      el.className = 'rankItem';
      const posClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      const crown = i === 0 ? '👑' : '';
      const pct = Math.max(0, (f.hp / f.maxHp) * 100);
      const hpCls = hpClass(pct);
      el.innerHTML = `
        <span class="rankPos ${posClass}">${crown || (i + 1)}</span>
        <span class="rankEmoji">${f.emoji}</span>
        <span class="rankName">${name}</span>
        <span class="rankLevel">LVL ${f.level}</span>
        <div class="rankHpBar"><div class="rankHpFill ${hpCls}" style="width:${pct}%"></div></div>
        <span class="rankHpText">${f.hp}/${f.maxHp}</span>
      `;
      list.appendChild(el);
    });
  }

  // If no battle happened yet, show champion vs #2
  if (!s.battleLog && rankings.length >= 2) {
    const champF = fighters[rankings[0]];
    const chalF = fighters[rankings[1]];
    if (champF && chalF) {
      $('bLeftEmoji').textContent = chalF.emoji;
      $('bLeftName').textContent = rankings[1];
      $('bLeftLevel').textContent = 'LVL ' + chalF.level;
      const chPct = Math.max(0, (chalF.hp / chalF.maxHp) * 100);
      $('bLeftHp').style.width = chPct + '%';
      $('bLeftHp').className = 'hpFill ' + hpClass(chPct);
      $('bLeftHpText').textContent = 'HP ' + chalF.hp + '/' + chalF.maxHp;

      $('bRightEmoji').textContent = champF.emoji;
      $('bRightName').textContent = rankings[0];
      $('bRightLevel').textContent = 'LVL ' + champF.level;
      const cPct = Math.max(0, (champF.hp / champF.maxHp) * 100);
      $('bRightHp').style.width = cPct + '%';
      $('bRightHp').className = 'hpFill ' + hpClass(cPct);
      $('bRightHpText').textContent = 'HP ' + champF.hp + '/' + champF.maxHp;
    }
  }

  $('sLikes').classList.remove('pop'); void $('sLikes').offsetWidth; $('sLikes').classList.add('pop');
  $('sCoins').classList.remove('pop'); void $('sCoins').offsetWidth; $('sCoins').classList.add('pop');
});

// ─── Fighter level up ───
socket.on('fighter_levelup', (d) => {
  showToast('⬆ ' + d.username + ' SUBE A NIVEL ' + d.level + '! ' + d.emoji, 'levelup');
});

// ─── Arena level up ───
socket.on('arena_levelup', (d) => {
  showToast('🌟 LA ARENA SUBE A NIVEL ' + d.level + '!', 'arena_up');
});

// ─── Feed ────────────────────────────────────────────────────
const feed = $('feed');
socket.on('event', (ev) => {
  const el = document.createElement('div');
  el.className = 'feedItem';
  let txt = '';
  if (ev.type === 'like') txt = '❤ ' + ev.user + ' dio ' + (ev.count || 1) + ' me gusta';
  else if (ev.type === 'gift') txt = '🪙 ' + ev.user + ' donó ' + (ev.gift || '') + ' x' + (ev.diamonds || 1);
  else if (ev.type === 'follow') txt = '⭐ ' + ev.user + ' siguió';
  else if (ev.type === 'share') txt = '🔗 ' + ev.user + ' compartió';
  else if (ev.type === 'comment') txt = '💬 ' + ev.user + ': "' + (ev.comment || '') + '"';
  el.textContent = txt;
  feed.innerHTML = '';
  feed.appendChild(el);
});
</script>
</body>
</html>
